<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#15110e">
  <title>L'oko Coffee — Menu</title>
  <link rel="icon" type="image/svg+xml" href="lokocoffee.svg">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100dvh;
      background: #0c0a08;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    .frame-shell {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      background: #15110e;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #15110e;
    }
    noscript {
      position: fixed;
      inset: auto 16px 16px;
      z-index: 1;
      display: block;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(21, 17, 14, 0.92);
      color: #efe7da;
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    noscript a { color: #d6b26a; }
  </style>
</head>

<body>
  <main class="frame-shell" aria-label="L'oko Coffee menu">
    <iframe
      title="L'oko Coffee menu"
      src="https://loko-coffee-vercel.vercel.app/"
      loading="eager"
      referrerpolicy="no-referrer-when-downgrade"
      allow="clipboard-write">
    </iframe>
  </main>
  <noscript>
    JavaScript needed for embedded menu. Open 
    <a href="https://loko-coffee-vercel.vercel.app/">menu here</a>.
  </noscript>
</body>

</html>
